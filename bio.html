<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biolink Official - Ares Store Development</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: linear-gradient(135deg, #060b13 0%, #0a111e 50%, #03060a 100%); background-attachment: fixed; color: #f1f5f9; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .bio-container { width: 100%; max-width: 420px; padding: 40px 20px; text-align: center; }
        
        /* ========================================= */
        /* WADAH PROFIL UTAMA & CENTANG BIRU         */
        /* ========================================= */
        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
        }

        .bio-pfp { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid #3b82f6; 
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); 
        }

        /* Lencana Centang Biru Premium */
        .verified-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #3b82f6;
            color: #ffffff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            border: 2.5px solid #060b13;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .bio-name { font-size: 24px; font-weight: 800; margin: 0; text-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .bio-tagline { font-size: 14px; color: #94a3b8; margin: 5px 0 15px 0; }

        /* KONTAK WA UTAMA */
        .wa-utama-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: rgba(37, 211, 102, 0.15); border: 1px solid rgba(37, 211, 102, 0.4); color: #25d366; padding: 8px 18px; border-radius: 30px; font-size: 12px; font-weight: 700; text-decoration: none; margin-bottom: 20px; transition: 0.3s; box-shadow: 0 0 15px rgba(37, 211, 102, 0.1); }
        .wa-utama-btn:hover { background: #25d366; color: #fff; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); transform: scale(1.03); }

        /* SOSIAL MEDIA BAR */
        .sosmed-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .sosmed-item { width: 45px; height: 45px; border-radius: 50%; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; text-decoration: none; color: #cbd5e1; font-size: 18px; transition: 0.3s; }
        .sosmed-item:hover { transform: translateY(-5px); color: #3b82f6; border-color: #3b82f6; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }

        /* LIST LINK DINAMIS */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .bio-link { display: flex; align-items: center; background: rgba(15, 23, 42, 0.55); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; padding: 12px 16px; text-decoration: none; color: #f1f5f9; border: 1px solid rgba(255,255,255,0.05); border-top: 1px solid rgba(59, 130, 246, 0.2); transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .bio-link:hover { transform: scale(1.02); background: rgba(15, 23, 42, 0.8); border-color: #3b82f6; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2); }
        
        .link-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid rgba(59, 130, 246, 0.3); flex-shrink: 0; }
        
        /* Wadah Ikon Default Pintar */
        .link-img-default { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 16px; flex-shrink: 0; }
        .bg-wa { background: linear-gradient(135deg, #128c7e, #25d366); border: 1px solid rgba(37, 211, 102, 0.4); color: #fff; box-shadow: 0 0 10px rgba(37, 211, 102, 0.2); }
        .bg-link { background: linear-gradient(135deg, #1e3a8a, #3b82f6); border: 1px solid rgba(59, 130, 246, 0.4); color: #fff; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        
        .link-text { flex-grow: 1; text-align: left; font-weight: 700; font-size: 14px; letter-spacing: 0.2px; }
        .footer { margin-top: 40px; font-size: 10px; color: #475569; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="bio-container">
        <div class="avatar-wrapper">
            <img id="mainPfp" src="https://via.placeholder.com/150" class="bio-pfp">
            <div class="verified-badge">
                <i class="fas fa-check"></i>
            </div>
        </div>
        
        <h1 id="mainTitle" class="bio-name">Ares Store</h1>
        <p id="mainTagline" class="bio-tagline">Loading Store...</p>

        <div id="waUtamaContainer"></div>
        <div class="sosmed-bar" id="sosmedBar"></div>
        <div class="links-wrapper" id="linksContainer"></div>

        <p class="footer">POWERED BY ARES STORE DEVELOPMENT</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyBlA6Ako746QFbTsXZ-OuqPCBZ6De1vytI", projectId: "kolase-akun" }));

        async function init() {
            try {
                const snap = await getDoc(doc(db, "biolink_data", "profil"));
                if(snap.exists()) {
                    const d = snap.data();
                    document.getElementById("mainTitle").innerText = d.nama || "Ares Store";
                    document.getElementById("mainTagline").innerText = d.tagline || "";
                    if(d.foto) document.getElementById("mainPfp").src = d.foto;

                    if(d.waUtama) {
                        let cleanNum = d.waUtama.replace(/[^0-9]/g, "");
                        if(cleanNum.startsWith("0")) cleanNum = "62" + cleanNum.slice(1);
                        document.getElementById("waUtamaContainer").innerHTML = `<a href="https://wa.me/${cleanNum}" target="_blank" class="wa-utama-btn"><i class="fab fa-whatsapp"></i> Chat WhatsApp Admin</a>`;
                    } else { document.getElementById("waUtamaContainer").innerHTML = ""; }

                    let sHTML = "";
                    if(d.tt) sHTML += `<a href="${d.tt}" target="_blank" class="sosmed-item"><i class="fab fa-tiktok"></i></a>`;
                    if(d.ig) sHTML += `<a href="${d.ig}" target="_blank" class="sosmed-item"><i class="fab fa-instagram"></i></a>`;
                    if(d.yt) sHTML += `<a href="${d.yt}" target="_blank" class="sosmed-item"><i class="fab fa-youtube"></i></a>`;
                    if(d.mail) sHTML += `<a href="mailto:${d.mail}" class="sosmed-item"><i class="fas fa-envelope"></i></a>`;
                    document.getElementById("sosmedBar").innerHTML = sHTML;
                }

                const q = query(collection(db, "biolink_links"), orderBy("createdAt", "asc"));
                const links = await getDocs(q);
                const cont = document.getElementById("linksContainer");
                cont.innerHTML = "";
                
                links.forEach(l => {
                    const data = l.data();
                    let iconHTML = "";
                    
                    if (data.foto) {
                        iconHTML = `<img src="${data.foto}" class="link-img">`;
                    } else {
                        if (data.tipe === "grub") {
                            iconHTML = `<div class="link-img-default bg-link"><i class="fas fa-link"></i></div>`;
                        } else {
                            iconHTML = `<div class="link-img-default bg-wa"><i class="fab fa-whatsapp"></i></div>`;
                        }
                    }
                        
                    cont.innerHTML += `
                        <a href="${data.url}" target="_blank" class="bio-link">
                            ${iconHTML}
                            <div class="link-text">${data.judul}</div>
                            <i class="fas fa-chevron-right" style="font-size:12px; opacity:0.3; color:#3b82f6"></i>
                        </a>`;
                });
            } catch(e) { console.log(e); }
        }
        init();
    </script>
</body>
</html>
